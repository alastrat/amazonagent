services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${PG_PORT:-54324}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fba_orchestrator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:latest
    command: ["inngest", "dev", "-u", "http://api:8080/api/inngest"]
    ports:
      - "${INNGEST_PORT:-8290}:8288"
    environment:
      INNGEST_DEV: "1"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-8081}:8080"
    environment:
      PORT: "8080"
      ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fba_orchestrator?sslmode=disable
      SUPABASE_JWT_SECRET: dev-secret
      INNGEST_EVENT_KEY: test
      INNGEST_SIGNING_KEY: test
      INNGEST_DEV: "true"
      OPENFANG_API_URL: ""
      OPENFANG_API_KEY: ""
      POSTHOG_API_KEY: ""
      POSTHOG_HOST: https://app.posthog.com
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8081}
    ports:
      - "${WEB_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8081}
    depends_on:
      - api

volumes:
  pgdata:
