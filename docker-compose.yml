version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fba_orchestrator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:latest
    ports:
      - "8288:8288"
    environment:
      INNGEST_DEV: "1"

volumes:
  pgdata:
